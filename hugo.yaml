---
title: "Nemanja Tomic - Blogging About Tech"
baseURL: "https://nemanjatomic.net/"
# TODO: Create custom theme
theme: "zen"
languageCode: "en-us"

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: github

params:
  author:
    name: "Nemanja Tomic"
    url: "https://nemanjatomic.net/"
  contact: "nemanja.tomic@ik.me"
  description: "My personal blog where I write about IT and philosophy."
  dateformat: "2 January, 2006"
  logowidth: "75"
  mainSections:
    - posts
  feedlinks: true
  mobileMenu: true
  poweredby: true
  realfavicongenerator: true
  sidebar: false
  submitted: true

outputFormats:
  SearchIndex:
    mediaType: "application/json"
    baseName: "searchindex"
    isPlainText: true
    notAlternative: true

outputs:
  home: ["HTML", "RSS", "JSON", "SearchIndex"]
  section: ["HTML", "RSS", "JSON"]

languages:
  en:
    menu:
      main:
        - name: "Home"
          weight: -10
          pageRef: "/"
        - name: "Posts"
          weight: 10
          pageRef: "/posts/"
